<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fortnite Sprites Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="https://staticvacant.github.io/fnsprites/siteimages/staticsprite.png" alt="" class="brand-mark">
      <div>
        <h1>Fortnite Sprites</h1>
        <p>Own it. Master it. Find what is left.</p>
      </div>
    </div>

    <section class="stats" aria-label="Progress">
      <div class="stat">
        <span>Collection</span>
        <strong id="ownedText">0 / 0</strong>
        <div class="meter"><i id="ownedBar"></i></div>
      </div>
      <div class="stat stat-gold">
        <span>Mastery</span>
        <strong id="masteredText">0 / 0</strong>
        <div class="meter"><i id="masteredBar"></i></div>
      </div>
    </section>
  </header>

  <main class="layout">
    <aside class="controls" aria-label="Sprite filters">
      <label class="field">
        <span>Search</span>
        <input id="search" type="search" autocomplete="off" placeholder="Water, gummy, mythic...">
      </label>

      <label class="field">
        <span>Theme</span>
        <select id="theme"></select>
      </label>

      <div class="field">
        <span>Status</span>
        <div class="segments" id="statusTabs">
          <button class="active" data-status="all">All</button>
          <button data-status="owned">Owned</button>
          <button data-status="missing">Missing</button>
          <button data-status="mastered">Mastered</button>
        </div>
      </div>

      <label class="check">
        <input id="hideMastered" type="checkbox">
        <span>Hide mastered</span>
      </label>

      <label class="check">
        <input id="showUnreleased" type="checkbox">
        <span>Show unreleased</span>
      </label>

      <div class="actions">
        <button id="copyShare">Copy share link</button>
        <button id="markVisible">Mark visible owned</button>
        <button id="resetAll" class="danger">Reset tracker</button>
      </div>
    </aside>

    <section class="content">
      <div class="toolbar">
        <strong id="resultCount">0 sprites</strong>
        <span id="modeNote">Click a card to own it. Use Master on owned cards.</span>
      </div>
      <div id="grid" class="grid"></div>
      <div id="empty" class="empty" hidden>No sprites match this view.</div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
